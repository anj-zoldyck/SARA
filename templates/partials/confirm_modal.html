<div class="modal-overlay" id="genericConfirmModalOverlay">
  <div class="kiosk-modal" style="max-width: 450px;">
    <div class="kiosk-modal-header" style="position: relative;">
      <h5 class="kiosk-modal-title text-danger" id="genericConfirmTitle">
        <i class="bi bi-exclamation-triangle"></i> <span id="genericConfirmTitleText">Confirm Action</span>
      </h5>
    </div>
    <div class="kiosk-modal-body">
      <p class="mb-0 text-muted" id="genericConfirmMessage"></p>
    </div>
    <div class="kiosk-modal-footer" style="display:flex; justify-content:flex-end; gap:10px;">
      <button type="button" class="btn-dash-outline" id="genericConfirmCancelBtn">Cancel</button>
      <button type="button" class="btn btn-danger" id="genericConfirmProceedBtn" style="font-weight: 500; padding: 10px 16px; border-radius: 6px;">Confirm</button>
    </div>
  </div>
</div>
