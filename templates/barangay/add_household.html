{% extends 'base.html' %}

{% block title %}Add Household{% endblock %}

{% block content %}
<div class="container mt-4">
  <h2>Add Household – {{ zone.name }}</h2>

  <form method="post">
    {% csrf_token %}

    <div class="mb-3">
      <label class="form-label">House Number</label>
      {{ form.house_number }}
    </div>

    <div class="mb-3">
      <label class="form-label">Family Name</label>
      {{ form.family_name }}
    </div>

    <button type="submit" class="btn btn-primary">
      Save Household
    </button>

    <a href="{% url 'zone_detail' zone.id %}" class="btn btn-secondary">
      Cancel
    </a>
  </form>
</div>
{% endblock %}
