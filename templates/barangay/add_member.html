{% extends 'base.html' %}
{% block title %}Add Member{% endblock %}

{% block content %}
<div class="container mt-4">
  <h2>Add Member – {{ family.family_name }}</h2>

  <form method="post">
    {% csrf_token %}

    <div class="mb-3">
      <label>First Name</label>
      {{ form.first_name }}
    </div>

    <div class="mb-3">
      <label>Last Name</label>
      {{ form.last_name }}
    </div>

    <div class="mb-3">
      <label>Relationship</label>
      {{ form.relationship }}
    </div>

    <div class="mb-3">
      <label>Age</label>
      {{ form.age }}
    </div>

    <button type="submit" class="btn btn-primary">Save</button>
    <a href="{% url 'family_detail' family.id %}" class="btn btn-secondary">Cancel</a>
  </form>
</div>
{% endblock %}
