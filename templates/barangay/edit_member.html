{% extends 'base.html' %}
{% block title %}Edit Member{% endblock %}

{% block content %}
<div class="container mt-4">
  <h2>Edit Member</h2>

  <form method="post">
    {% csrf_token %}

    {{ form.as_p }}

    <button type="submit" class="btn btn-primary">Save Changes</button>
    <a href="{% url 'family_detail' member.family.id %}" class="btn btn-secondary">
      Back
    </a>
  </form>
</div>
{% endblock %}
