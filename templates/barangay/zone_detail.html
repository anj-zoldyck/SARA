{% extends 'base.html' %}
{% block content %}
<a href="{% url 'barangay_dashboard' %}" class="btn btn-secondary mb-3">
  ← Back to Dashboard
</a>

<h2>{{ zone.name }} - Households</h2>
<a href="{% url 'add_household' zone.id %}" class="btn btn-success mb-3">
  + Add Household
</a>
<div class="row">
    {% for household in households %}
    <div class="col-md-4 mb-3">
        <div class="card household-card">
            <div class="card-body text-center">
                <h5 class="card-title">House {{ household.house_number }}</h5>
                <p>{{ household.family_name }} Family</p>
                <a href="{% url 'household_detail' household.id %}" class="btn btn-primary">View Members</a>
            </div>
        </div>
    </div>
    {% endfor %}
</div>
{% endblock %}
