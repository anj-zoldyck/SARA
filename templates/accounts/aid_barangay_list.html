{% extends 'base.html' %}

{% block navbar_title %}{{ aid_type }} Aid{% endblock %}

{% block content %}
<div class="container mt-4">
  <h4>Barangays – {{ aid_type }}</h4>

  <div class="list-group mt-3">
    {% for barangay in barangays %}
      <a href="{% url 'aid_barangay_detail' aid_type barangay.id %}"
         class="list-group-item list-group-item-action">
        {{ barangay.name }}
      </a>
    {% endfor %}
  </div>
</div>
{% endblock %}
