{% extends 'base.html' %}

{% block navbar_title %}Aid Distribution{% endblock %}

{% block content %}
<div class="container mt-4">
  <h4>Select Aid Type</h4>

  <div class="row g-3 mt-3">
    {% for value, label in aid_types %}
    <div class="col-md-4 col-12">
      <a href="{% url 'aid_barangay_list' value %}" class="text-decoration-none">
        <div class="card p-4 text-center shadow-sm">
          <h5>{{ label }}</h5>
          <p class="text-muted mb-0">View claim monitoring</p>
        </div>
      </a>
    </div>
    {% endfor %}
  </div>
</div>
{% endblock %}
