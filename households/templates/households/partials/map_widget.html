<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>

<div class="acct-form__group">
  <label class="acct-form__label">
    <i class="bi bi-geo-fill"></i> Pin Location on Map
  </label>
  <div id="householdMap" style="height: 350px; border-radius: 0.5rem; border: 1px solid #e2e8f0; margin-bottom: 0.5rem; z-index: 1;"></div>
  
  <button type="button" id="use-current-location-btn" class="btn btn-sm btn-outline-secondary mb-2">
    <i class="bi bi-geo-alt"></i> Use Current Location
  </button>
  
  <div class="small text-muted mb-2">
    <i class="bi bi-info-circle"></i> This uses your device's current location as a starting point — please confirm or adjust the pin to match the exact household location.
  </div>

  {{ form.latitude }}
  {{ form.longitude }}

  <div class="small text-muted" id="mapCoordinatesDisplay">
    <i class="bi bi-info-circle"></i> Click on the map to place a pin. Drag the pin to adjust.
    <br>
    <strong>Coordinates:</strong> <span id="latDisplay">Not set</span>, <span id="lngDisplay">Not set</span>
  </div>
</div>

<script>
document.addEventListener('DOMContentLoaded', function() {
    // Fallback center: Santa Rita, Pampanga municipal center (poblacion area)
    const DEFAULT_MAP_CENTER = [14.9993, 120.6117];
    const DEFAULT_MAP_ZOOM = 15;
    
    const latInput = document.getElementById('{{ form.latitude.id_for_label }}');
    const lngInput = document.getElementById('{{ form.longitude.id_for_label }}');
    const latDisplay = document.getElementById('latDisplay');
    const lngDisplay = document.getElementById('lngDisplay');

    let initialLat = latInput.value ? parseFloat(latInput.value) : null;
    let initialLng = lngInput.value ? parseFloat(lngInput.value) : null;
    
    let center = DEFAULT_MAP_CENTER;
    let zoom = DEFAULT_MAP_ZOOM;

    if (initialLat && initialLng && !isNaN(initialLat) && !isNaN(initialLng)) {
        center = [initialLat, initialLng];
        zoom = 18;
    }

    var map = L.map('householdMap').setView(center, zoom);

    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        maxZoom: 19,
        attribution: '&copy; <a href="http://www.openstreetmap.org/copyright">OpenStreetMap</a>'
    }).addTo(map);

    var marker;

    function updateCoordinatesDisplay(lat, lng) {
        latInput.value = lat.toFixed(6);
        lngInput.value = lng.toFixed(6);
        latDisplay.textContent = lat.toFixed(6);
        lngDisplay.textContent = lng.toFixed(6);
    }

    if (initialLat && initialLng && !isNaN(initialLat) && !isNaN(initialLng)) {
        marker = L.marker([initialLat, initialLng], {draggable: true}).addTo(map);
        updateCoordinatesDisplay(initialLat, initialLng);
        
        marker.on('dragend', function(e) {
            var position = marker.getLatLng();
            updateCoordinatesDisplay(position.lat, position.lng);
        });
    }

    map.on('click', function(e) {
        if (marker) {
            marker.setLatLng(e.latlng);
        } else {
            marker = L.marker(e.latlng, {draggable: true}).addTo(map);
            marker.on('dragend', function(ev) {
                var position = marker.getLatLng();
                updateCoordinatesDisplay(position.lat, position.lng);
            });
        }
        updateCoordinatesDisplay(e.latlng.lat, e.latlng.lng);
    });
    
    // Fix leaflet map not loading fully inside some wrappers/modals
    setTimeout(function() {
        map.invalidateSize();
    }, 100);

    // Use Current Location button handler
    document.getElementById('use-current-location-btn').addEventListener('click', function() {
        if (!navigator.geolocation) {
            alert('Geolocation is not supported by your browser.');
            return;
        }
        navigator.geolocation.getCurrentPosition(
            function(position) {
                const lat = position.coords.latitude;
                const lng = position.coords.longitude;
                map.setView([lat, lng], 17);
                if (marker) {
                    marker.setLatLng([lat, lng]);
                } else {
                    marker = L.marker([lat, lng], {draggable: true}).addTo(map);
                    marker.on('dragend', function(e) {
                        var position = marker.getLatLng();
                        updateCoordinatesDisplay(position.lat, position.lng);
                    });
                }
                updateCoordinatesDisplay(lat, lng);
            },
            function(error) {
                alert('Unable to retrieve your location. Please pin the location manually on the map.');
            },
            { enableHighAccuracy: true, timeout: 10000 }
        );
    });
});
</script>
